<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1f3b"/>
      <stop offset="0.55" stop-color="#2563ff"/>
      <stop offset="1" stop-color="#13b5ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- speed streaks -->
  <g stroke="#c6ff00" stroke-width="13" stroke-linecap="round" opacity="0.9">
    <line x1="78" y1="150" x2="150" y2="150"/>
    <line x1="60" y1="200" x2="150" y2="200"/>
    <line x1="84" y1="250" x2="150" y2="250"/>
  </g>
  <!-- shuttlecock: feathered skirt -->
