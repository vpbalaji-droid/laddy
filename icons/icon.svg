    <!-- feathers -->
    <g fill="#ffffff">
      <path d="M300 120 L268 250 L300 240 Z"/>
      <path d="M300 120 L300 240 L332 250 Z" fill="#eef1f9"/>
      <path d="M262 138 L260 258 L286 244 Z"/>
      <path d="M338 138 L340 258 L314 244 Z" fill="#eef1f9"/>
      <path d="M232 170 L250 268 L274 250 Z"/>
      <path d="M368 170 L350 268 L326 250 Z" fill="#eef1f9"/>
    </g>
    <!-- cork base -->
    <ellipse cx="300" cy="300" rx="52" ry="44" fill="#c6ff00"/>
    <ellipse cx="300" cy="296" rx="52" ry="40" fill="#dcff5a"/>
    <path d="M252 300 Q300 332 348 300 L348 312 Q300 348 252 312 Z" fill="#a9e000"/>
  </g>
</svg>
